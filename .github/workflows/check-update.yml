name: Check Playwright Update

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest Playwright version from npm
        id: upstream
        run: |
          LATEST=$(npm view playwright version)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Upstream Playwright: $LATEST"

      - name: Get latest tag in this repo
        id: local
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1)
          LOCAL=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "Local tag: $TAG ($LOCAL)"

      - name: Compare and tag if newer
        env:
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          LOCAL: ${{ steps.local.outputs.version }}
        run: |
          echo "Upstream: $UPSTREAM  Local: $LOCAL"
          if [ "$UPSTREAM" = "$LOCAL" ]; then
            echo "Already up to date."
            exit 0
          fi

          # Compare semver: only tag if upstream is strictly newer
          printf '%s\n%s\n' "$LOCAL" "$UPSTREAM" | sort -V | tail -n1 | grep -qx "$UPSTREAM" || {
            echo "Upstream is not newer, skipping."
            exit 0
          }

          echo "New version detected: $UPSTREAM"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${UPSTREAM}"
          git push origin "v${UPSTREAM}"
