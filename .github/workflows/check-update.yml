name: Check Playwright MCP Update

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest @playwright/mcp version
        id: upstream
        run: |
          MCP=$(npm view @playwright/mcp version)
          PW=$(npm view @playwright/mcp dependencies.playwright)
          echo "mcp=$MCP" >> "$GITHUB_OUTPUT"
          echo "pw=$PW" >> "$GITHUB_OUTPUT"
          echo "@playwright/mcp: $MCP (bundles playwright: $PW)"

      - name: Get latest tag in this repo
        id: local
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1 || true)
          if [ -z "$TAG" ]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "No tags found"
          else
            # Extract MCP part (first 3 segments) from tag like v0.0.68.0
            LOCAL=$(echo "${TAG#v}" | cut -d. -f1-3)
            echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
            echo "Local tag: $TAG (mcp version: $LOCAL)"
          fi

      - name: Compare and tag if newer
        env:
          MCP: ${{ steps.upstream.outputs.mcp }}
          PW: ${{ steps.upstream.outputs.pw }}
          LOCAL: ${{ steps.local.outputs.version }}
        run: |
          echo "Upstream MCP: $MCP  Local: $LOCAL"
          if [ "$MCP" = "$LOCAL" ]; then
            echo "Already up to date."
            exit 0
          fi

          if [ -n "$LOCAL" ]; then
            printf '%s\n%s\n' "$LOCAL" "$MCP" | sort -V | tail -n1 | grep -qx "$MCP" || {
              echo "Upstream is not newer, skipping."
              exit 0
            }
          fi

          echo "New MCP version: $MCP (playwright: $PW)"

          # Alpha builds are under /next/, stable under /driver/
          if echo "$PW" | grep -q 'alpha'; then
            CDN="https://playwright.azureedge.net/builds/driver/next"
          else
            CDN="https://playwright.azureedge.net/builds/driver"
          fi

          URL="${CDN}/playwright-${PW}-win32_x64.zip"
          HTTP=$(curl -sLo /dev/null -w '%{http_code}' "$URL")
          if [ "$HTTP" != "200" ]; then
            echo "Driver not available yet at $URL (HTTP $HTTP), skipping."
            exit 0
          fi
          echo "Driver confirmed at $URL (HTTP $HTTP)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${MCP}.0"
          git push origin "v${MCP}.0"
