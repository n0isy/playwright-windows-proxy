name: Check Playwright Update

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Playwright version used by @playwright/mcp
        id: upstream
        run: |
          # Track the Playwright version that @playwright/mcp actually uses,
          # not the stable playwright package (MCP often ships with alpha builds)
          RAW=$(npm view @playwright/mcp dependencies.playwright)
          # Strip any prerelease suffix (-alpha-xxx) to get the base version
          LATEST=$(echo "$RAW" | sed 's/-.*//')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "@playwright/mcp uses playwright: $RAW (base: $LATEST)"

      - name: Get latest tag in this repo
        id: local
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1)
          LOCAL=${TAG#v}
          # Extract first 3 segments to match npm semver (tags may have 4: 1.58.2.4)
          PW_LOCAL=$(echo "$LOCAL" | cut -d. -f1-3)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PW_LOCAL" >> "$GITHUB_OUTPUT"
          echo "Local tag: $TAG (pw version: $PW_LOCAL)"

      - name: Compare and tag if newer
        env:
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          LOCAL: ${{ steps.local.outputs.version }}
        run: |
          echo "Upstream: $UPSTREAM  Local: $LOCAL"
          if [ "$UPSTREAM" = "$LOCAL" ]; then
            echo "Already up to date."
            exit 0
          fi

          # Compare semver: only tag if upstream is strictly newer
          printf '%s\n%s\n' "$LOCAL" "$UPSTREAM" | sort -V | tail -n1 | grep -qx "$UPSTREAM" || {
            echo "Upstream is not newer, skipping."
            exit 0
          }

          echo "New version detected: $UPSTREAM"

          # Verify the driver zip exists on CDN before tagging
          URL="https://playwright.azureedge.net/builds/driver/playwright-${UPSTREAM}-win32_x64.zip"
          HTTP=$(curl -sLo /dev/null -w '%{http_code}' "$URL")
          if [ "$HTTP" != "200" ]; then
            echo "Driver not available yet at $URL (HTTP $HTTP), skipping."
            exit 0
          fi
          echo "Driver confirmed available (HTTP $HTTP)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${UPSTREAM}"
          git push origin "v${UPSTREAM}"
