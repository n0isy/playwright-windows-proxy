name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: .bin/build.ps1

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: .bin/playwright-proxy.exe
