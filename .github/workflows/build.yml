name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'n0isy/playwright-windows-proxy'
    runs-on: windows-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Playwright version from MCP
        id: version
        shell: pwsh
        run: |
          # Tag is v{mcp}.{patch} e.g. v0.0.68.0 → MCP version 0.0.68
          $tag = "$env:TAG" -replace '^v', ''
          $mcp = ($tag -split '\.')[0..2] -join '.'
          $pw = (npm view "@playwright/mcp@$mcp" dependencies.playwright)
          echo "mcp=$mcp" >> $env:GITHUB_OUTPUT
          echo "pw=$pw" >> $env:GITHUB_OUTPUT
          Write-Host "MCP: $mcp → Playwright: $pw"

      - name: Build
        shell: pwsh
        run: .bin/build.ps1 -PwVersion ${{ steps.version.outputs.pw }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: .bin/playwright-proxy.exe
          body: |
            @playwright/mcp: `${{ steps.version.outputs.mcp }}`
            Playwright driver: `${{ steps.version.outputs.pw }}`
